services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: mrf_analytics
      POSTGRES_USER: mrf
      POSTGRES_PASSWORD: mrf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrf -d mrf_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql+psycopg://mrf:mrf@db:5432/mrf_analytics
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api/app:/app/app

  web:
    build:
      context: ./web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./web/app:/app/app
      - ./web/components:/app/components
      - ./web/lib:/app/lib

volumes:
  postgres_data:

